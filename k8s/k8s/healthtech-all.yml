apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-initdb
  labels:
    app: mysql
data:
  init.sql: |
    CREATE DATABASE IF NOT EXISTS ADMP;
    CREATE DATABASE IF NOT EXISTS CITAS;
    CREATE DATABASE IF NOT EXISTS ESPECIALIDAD;
    CREATE DATABASE IF NOT EXISTS EXAMEN;
    CREATE DATABASE IF NOT EXISTS FARMACIA;
    CREATE DATABASE IF NOT EXISTS FICHA;
    CREATE DATABASE IF NOT EXISTS HOSPITALIZACION;
    CREATE DATABASE IF NOT EXISTS INVENTARIO;
    CREATE DATABASE IF NOT EXISTS PERSONAL;
    CREATE DATABASE IF NOT EXISTS PROVEEDOR;
    CREATE DATABASE IF NOT EXISTS RECETA;

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
      - name: mysql
        image: mysql:8.0
        env:
        - name: MYSQL_ROOT_PASSWORD
          value: copito2004
        - name: MYSQL_DATABASE
          value: ADMP
        ports:
        - containerPort: 5506
        volumeMounts:
        - name: mysql-initdb
          mountPath: /docker-entrypoint-initdb.d
      volumes:
      - name: mysql-initdb
        configMap:
          name: mysql-initdb

---
apiVersion: v1
kind: Service
metadata:
  name: mysql
spec:
  selector:
    app: mysql
  ports:
  - port: 5506
    targetPort: 5506
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: healthtech-admp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: healthtech-admp
  template:
    metadata:
      labels:
        app: healthtech-admp
    spec:
      initContainers:
      - name: wait-for-mysql
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z mysql 5506; do echo esperando mysql; sleep 3; done']
      containers:
      - name: healthtech-admp
        image: 784303971152.dkr.ecr.us-east-1.amazonaws.com/ms-amdp:latest
        imagePullPolicy: Always
        env:
        - name: DB_HOST
          value: mysql
        - name: DB_PORT
          value: "5506"
        - name: DB_NAME
          value: ADMP
        - name: DB_USER
          value: root
        - name: DB_PASSWORD
          value: copito2004
        ports:
        - containerPort: 8081

---
apiVersion: v1
kind: Service
metadata:
  name: healthtech-admp-service
spec:
  selector:
    app: healthtech-admp
  ports:
  - port: 8081
    targetPort: 8081
  type: ClusterIP

